run:
  id: tls_schools_access_draft
  country: TLS
  description: Timor-Leste school access draft using reusable data objects and swappable routing.

storage:
  root: data/runs/{run_id}
  defaults:
    table: parquet
    geotable: parquet
    review: xlsx
    manifest: yaml

datasets:
  schools:
    uri: data/raw/tls_osm_schools.parquet
    schema: facility.v1
    crs: EPSG:4326
  population:
    uri: data/raw/tls_population.parquet
    schema: point.v1
    crs: EPSG:4326
  roads:
    uri: data/raw/tls_roads.osm.pbf
    schema: network.v1

routing:
  engine: pandana
  mode: road_distance
  snap_max_distance_m: 5000

geocoding:
  stages:
    - normalize_names
    - osm_amenity_match
    - nominatim
    - reference_dataset
    - validation
    - confidence

artifacts:
  distance_matrix:
    format_role: table
    cache_policy: content_addressed
  geocode_candidates:
    format_role: table
    cache_policy: content_addressed
  manual_review_sample:
    format_role: review
    cache_policy: never
