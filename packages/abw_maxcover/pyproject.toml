[build-system]
requires = ["setuptools>=77", "wheel"]
build-backend = "setuptools.build_meta"

[project]
name = "abw-maxcover"
version = "0.2.0"
description = "Sparse exact and heuristic algorithms for maximum-covering frontiers."
readme = "README.md"
requires-python = ">=3.10"
authors = [
  {name = "Parvathy K. Krishnakumari"},
  {name = "Dick den Hertog"},
  {name = "Joaquim Gromicho"},
]
maintainers = [{name = "Analytics for a Better World"}]
license = "MIT"
license-files = ["LICENSE"]
keywords = [
  "maximum coverage",
  "facility location",
  "pareto frontier",
  "submodular optimization",
  "public infrastructure",
  "optimization",
  "heuristics",
]
classifiers = [
  "Development Status :: 4 - Beta",
  "Intended Audience :: Science/Research",
  "Programming Language :: Python :: 3",
  "Programming Language :: Python :: 3 :: Only",
  "Programming Language :: Python :: 3.10",
  "Programming Language :: Python :: 3.11",
  "Programming Language :: Python :: 3.12",
  "Programming Language :: Python :: 3.13",
  "Programming Language :: Python :: 3.14",
  "Topic :: Scientific/Engineering :: Mathematics",
  "Typing :: Typed",
]
dependencies = [
  "numpy>=1.23",
]

[project.urls]
Homepage = "https://github.com/Analytics-for-a-Better-World/Public-Infrastructure-Service-Access/tree/main/packages/abw_maxcover"
Repository = "https://github.com/Analytics-for-a-Better-World/Public-Infrastructure-Service-Access"
Issues = "https://github.com/Analytics-for-a-Better-World/Public-Infrastructure-Service-Access/issues"
Documentation = "https://github.com/Analytics-for-a-Better-World/Public-Infrastructure-Service-Access/tree/main/packages/abw_maxcover/docs"

[project.optional-dependencies]
gurobi = ["gurobipy>=10"]
pyomo = ["pyomo>=6", "highspy>=1.7"]
data = ["pandas>=2"]
benchmark = ["scipy>=1.10", "pandas>=2", "psutil>=5.9"]
test = ["pytest>=8", "build>=1.2", "twine>=5"]
dev = [
  "pytest>=8",
  "build>=1.2",
  "twine>=5",
  "ruff>=0.6",
  "line_profiler>=4",
]

[tool.setuptools.packages.find]
where = ["src"]

[tool.setuptools.package-data]
abw_maxcover = ["py.typed", "README.md"]

[tool.pytest.ini_options]
testpaths = ["tests"]
addopts = "-ra"

[tool.ruff]
target-version = "py310"
line-length = 100

[tool.ruff.lint]
select = ["E", "F", "I", "UP", "B"]
ignore = ["E501"]
