name: abw-maxcover package

on:
  push:
    branches: ["main", "dev"]
    paths:
      - "packages/abw_maxcover/**"
      - ".github/workflows/abw-maxcover.yml"
  pull_request:
    branches: ["main", "dev"]
    paths:
      - "packages/abw_maxcover/**"
      - ".github/workflows/abw-maxcover.yml"

jobs:
  lint:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: packages/abw_maxcover
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Check source quality
        run: |
          python -m pip install ruff
          python -m ruff check src tests examples benchmarks
          python -m ruff format --check src tests examples benchmarks

  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11", "3.12", "3.13", "3.14"]
    defaults:
      run:
        working-directory: packages/abw_maxcover
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip
          cache-dependency-path: packages/abw_maxcover/pyproject.toml
      - name: Install package and test dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e ".[test]"
      - name: Run tests
        run: python -m pytest -q
      - name: Run example
        run: python examples/small_working_example.py
      - name: Run portable benchmark smoke test
        run: python benchmarks/run_scaling.py --output benchmark-output --skip-million

  distribution:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: packages/abw_maxcover
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Build and inspect distributions
        run: |
          python -m pip install --upgrade pip build twine
          python -m build
          python -m twine check dist/*
      - uses: actions/upload-artifact@v4
        with:
          name: abw-maxcover-distributions
          path: packages/abw_maxcover/dist/*
